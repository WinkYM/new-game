<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>祝我的RBB大宝贝生日快乐💐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #cf52b0 0%, #c596ba 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* align-items: center; */
            padding: 1.5rem;
            position: relative;
            overflow-y: auto;
        }

        /* 主容器 — 背景内容区域 */
        .main-content {
            text-align: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 700px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .main-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .main-content p {
            color: #cdd9ff;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .card-info {
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            border-left: 4px solid #ff2a6d;
        }

        .card-info p {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        /* 倒计时弹窗 - 浮动在右下角 */
        .countdown-floating {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            visibility: visible;
            opacity: 1;
            transition: opacity 0.35s ease, visibility 0.35s, transform 0.3s ease;
            max-width: 380px;
            width: calc(100% - 40px);
        }

        .countdown-floating.hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateX(50px);
        }

        /* 弹窗卡片样式 - 紧凑型右下角卡片 */
        .countdown-card {
            background: rgba(55, 78, 113, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 1.2rem 1.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 80, 120, 0.6);
            animation: slideInRight 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: default;
        }

        @keyframes slideInRight {
            0% {
                transform: translateX(100px);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.8rem;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #ffb347, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .target-date {
            font-size: 0.7rem;
            background: rgba(68, 137, 180, 0.3);
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 60px;
            color: #f3ac55;
            font-weight: 500;
        }

        /* 紧凑倒计时 */
        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0 0.8rem;
        }

        .time-block {
            background: #db407bca;
            border-radius: 20px;
            padding: 0.5rem 0.2rem;
            min-width: 65px;
            box-shadow: inset 0 1px 2px rgba(139, 32, 32, 0.5), 0 4px 10px rgba(67, 60, 60, 0.2);
            border-bottom: 2px solid #d42992;
        }

        .time-number {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #fff, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .time-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 1px;
            color: #a9bfe6;
            margin-top: 0.2rem;
        }

        .countdown-message {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.4);
            padding: 0.4rem;
            border-radius: 40px;
            color: #f0f3fa;
        }

        .btn-redirect {
            margin-top: 1rem;
            background: linear-gradient(95deg, #de1a65, #ca4d73);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 46, 99, 0.3);
            border: 1px solid rgba(255,255,200,0.5);
        }

        .btn-redirect:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ff1e55, #ff7620);
        }

        .btn-redirect:active {
            transform: scale(0.98);
        }

        .note-text {
            font-size: 0.6rem;
            margin-top: 0.8rem;
            opacity: 0.6;
            color: #ccc;
        }

        /* 底部装饰 */
        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #7f8fa4;
        }

        /* 可选的关闭按钮（小叉） */
        .close-floating {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(0,0,0,0.4);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .close-floating:hover {
            background: #ff2e63;
            opacity: 1;
        }

        @media (max-width: 550px) {
            .countdown-floating {
                bottom: 10px;
                right: 10px;
                max-width: 340px;
            }
            .time-block {
                min-width: 55px;
            }
            .time-number {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="main-content">
    <h1>💕生日倒计时🎁</h1>
    <p>期待与你的重逢❤️I Miss You😭</p>
    <div class="card-info">
        <p>🎉独属于你的惊喜：<br><strong id="displayTargetDate">加载中...</strong></p>
        <p>⏳请耐心等待倒计时归零😄</p>
        <p>当然你也可以直接点击前往，但我完全不建议❌️</p>
    </div>
    <div class="footer" style="color: #cdd9ff;">
        倒计时结束瞬间将会有惊喜出现🎬
    </div>
</div>

<!-- 倒计时弹窗 - 浮动在右下角 -->
<div id="countdownFloating" class="countdown-floating">
    <div class="countdown-card">
        <div class="card-header">
            <span class="modal-title">👧 距你的生日 ⭐</span>
            <span class="target-date" id="modalTargetDate">2026年5月1日</span>
        </div>
        <div class="countdown-timer" id="timerContainer">
            <div class="time-block"><div class="time-number" id="days">00</div><div class="time-label">天</div></div>
            <div class="time-block"><div class="time-number" id="hours">00</div><div class="time-label">时</div></div>
            <div class="time-block"><div class="time-number" id="minutes">00</div><div class="time-label">分</div></div>
            <div class="time-block"><div class="time-number" id="seconds">00</div><div class="time-label">秒</div></div>
        </div>
        <div class="countdown-message" id="statusMsg">
            🌟距离你的20岁第一天开启还有
        </div>
        <button id="jumpBtn" class="btn-redirect">🎬 立即预览惊喜 🎬</button>
        <div class="note-text">倒计时归零将自动弹出惊喜 | 点击按钮可提前偷窥</div>
    </div>
</div>

<script>
    
    (function() {
        // ---------- 配置区域 ----------
        const TARGET_YEAR = 2026;
        const TARGET_MONTH = 3;      // 5月 (0=1月,4=5月)
        const TARGET_DAY = 29;
        const TARGET_HOUR = 21;
        const TARGET_MINUTE = 25;
        const TARGET_SECOND = 0;
        const DOUYIN_VIDEO_URL = "https://www.douyin.com/video/7603225614669966438";
        
        const targetDateObj = new Date(TARGET_YEAR, TARGET_MONTH, TARGET_DAY, TARGET_HOUR, TARGET_MINUTE, TARGET_SECOND);
        const targetDateStr = `${TARGET_YEAR}年${TARGET_MONTH+1}月${TARGET_DAY}日`;
        
        const displayTargetSpan = document.getElementById('displayTargetDate');
        const modalTargetSpan = document.getElementById('modalTargetDate');
        if (displayTargetSpan) displayTargetSpan.innerText = targetDateStr;
        if (modalTargetSpan) modalTargetSpan.innerText = targetDateStr;
        
        const floatingModal = document.getElementById('countdownFloating');
        const daysSpan = document.getElementById('days');
        const hoursSpan = document.getElementById('hours');
        const minutesSpan = document.getElementById('minutes');
        const secondsSpan = document.getElementById('seconds');
        const statusMsgDiv = document.getElementById('statusMsg');
        const jumpBtn = document.getElementById('jumpBtn');
        
        let hasAutoRedirected = false;
        let countdownInterval = null;
        
        // function redirectToDouyin() {
        //     if (!DOUYIN_VIDEO_URL) {
        //         console.warn("未配置抖音视频链接");
        //         alert("未配置有效的抖音视频链接，请联系管理员配置。");
        //         return;
        //     }
        //     window.location.href = DOUYIN_VIDEO_URL;
        // }
        
        // 显示自定义祝福弹窗
function showBirthdayBlessing(callback) {
    // 创建弹窗元素
    const blessingModal = document.createElement('div');
    blessingModal.innerHTML = `
        <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index:10000;">
            <div style="background:linear-gradient(145deg, #ff9a9e, #fad0c4); border-radius:60px; padding:2rem; text-align:center; max-width:350px; animation:bounceIn 0.4s ease;">
                <h2 style="font-size:2rem; margin-bottom:1rem; color:#fff;">😊 噜噜宝贝来</h2>
                <p style="font-size:1.5rem; margin-bottom:1.5rem; color:#fff; font-weight:bold;">祝你生日快乐啦 🎂</p>
                <button id="blessingConfirmBtn" style="background:#ff6b6b; border:none; padding:0.8rem 2rem; border-radius:50px; font-size:1.2rem; font-weight:bold; color:white; cursor:pointer;">确定</button>
            </div>
        </div>
    `;
    document.body.appendChild(blessingModal);
    
    // 添加动画样式
    const style = document.createElement('style');
    style.textContent = `
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
    `;
    document.head.appendChild(style);
    
    // 绑定确定按钮事件
    document.getElementById('blessingConfirmBtn').onclick = function() {
        document.body.removeChild(blessingModal);
        if (callback) callback();
    };
}

// 修改跳转函数
function redirectToDouyin() {
    if (!DOUYIN_VIDEO_URL) {
        console.warn("未配置抖音视频链接");
        alert("未配置有效的抖音视频链接，请联系管理员配置。");
        return;
    }
    
    // 显示祝福弹窗，用户点击确定后再跳转
    showBirthdayBlessing(function() {
        window.open(DOUYIN_VIDEO_URL, '_blank');
    });
}
        function updateCountdown() {
            const now = new Date();
            const targetTime = targetDateObj.getTime();
            const diffMs = targetTime - now.getTime();
            
            if (diffMs <= 0) {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                if (daysSpan) daysSpan.innerText = '00';
                if (hoursSpan) hoursSpan.innerText = '00';
                if (minutesSpan) minutesSpan.innerText = '00';
                if (secondsSpan) secondsSpan.innerText = '00';
                if (statusMsgDiv) statusMsgDiv.innerHTML = '🎯 终于等到！请收下你的生日惊喜 🎯';
                
                if (!hasAutoRedirected) {
                    hasAutoRedirected = true;
                    setTimeout(() => {
                        if (floatingModal && !floatingModal.classList.contains('hidden')) {
                            floatingModal.classList.add('hidden');
                        }
                        redirectToDouyin();
                    }, 200);
                }
                return;
            }
            
            let totalSeconds = Math.floor(diffMs / 1000);
            const days = Math.floor(totalSeconds / 86400);
            totalSeconds %= 86400;
            const hours = Math.floor(totalSeconds / 3600);
            totalSeconds %= 3600;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            
            if (daysSpan) daysSpan.innerText = days.toString().padStart(2, '0');
            if (hoursSpan) hoursSpan.innerText = hours.toString().padStart(2, '0');
            if (minutesSpan) minutesSpan.innerText = minutes.toString().padStart(2, '0');
            if (secondsSpan) secondsSpan.innerText = seconds.toString().padStart(2, '0');
            
            if (statusMsgDiv && days === 0 && hours < 1) {
                statusMsgDiv.innerHTML = '🔥 惊喜即将揭晓 🔥';
            } else if (statusMsgDiv && days === 0) {
                statusMsgDiv.innerHTML = '⏰ 就在今天，敬请期待 ⏰';
            } else {
                statusMsgDiv.innerHTML = '✨ 倒计时进行中 ✨';
            }
        }
        
        function initModalAndTimer() {
            const nowTime = new Date().getTime();
            const targetTime = targetDateObj.getTime();
            const isExpired = nowTime >= targetTime;
            
            if (floatingModal) {
                floatingModal.classList.remove('hidden');
            }
            
            if (isExpired) {
                if (daysSpan) daysSpan.innerText = '00';
                if (hoursSpan) hoursSpan.innerText = '00';
                if (minutesSpan) minutesSpan.innerText = '00';
                if (secondsSpan) secondsSpan.innerText = '00';
                if (statusMsgDiv) statusMsgDiv.innerHTML = '🎬 时间已到，立即观看视频 🎬';
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                if (!hasAutoRedirected) {
                    hasAutoRedirected = true;
                    setTimeout(() => {
                        if (floatingModal && !floatingModal.classList.contains('hidden')) {
                            floatingModal.classList.add('hidden');
                        }
                        redirectToDouyin();
                    }, 400);
                }
                return;
            }
            
            updateCountdown();
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                updateCountdown();
            }, 1000);
        }
        
        function onManualRedirect() {
            if (floatingModal && !floatingModal.classList.contains('hidden')) {
                floatingModal.classList.add('hidden');
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            redirectToDouyin();
        }
        
        if (jumpBtn) {
            jumpBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!hasAutoRedirected) {
                    hasAutoRedirected = true;
                }
                onManualRedirect();
            });
        }
        
        function handleVisibilityChange() {
            if (!document.hidden) {
                if (countdownInterval) {
                    updateCountdown();
                } else {
                    const nowTime = new Date().getTime();
                    const targetTime = targetDateObj.getTime();
                    if (nowTime < targetTime && !hasAutoRedirected && floatingModal && !floatingModal.classList.contains('hidden')) {
                        if (countdownInterval) clearInterval(countdownInterval);
                        countdownInterval = setInterval(() => updateCountdown(), 1000);
                        updateCountdown();
                    }
                }
            }
        }
        document.addEventListener('visibilitychange', handleVisibilityChange);
        
        initModalAndTimer();
        
        console.log(`倒计时目标: ${targetDateStr}, 抖音视频地址: ${DOUYIN_VIDEO_URL}`);
    })();
</script>
</body>
</html>
